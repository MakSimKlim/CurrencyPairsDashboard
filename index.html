<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Валютный Дашборд</title>
	<link rel="stylesheet" href="styles.css">
    
    <link rel="apple-touch-icon" href="icons8-currency-100.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons8-currency-100.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/drag-drop-touch/1.3.0/drag-drop-touch.esm.min.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.0/DragDropTouch.js"></script>

    <style>
        /* Предотвращаем стандартный скролл страницы только на перетаскиваемых карточках */
        [draggable="true"] {
            touch-action: none;
            -webkit-user-drag: element;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans select-none">

    <div class="container mx-auto px-4 pb-8 max-w-4xl">
        
        <header class="sticky top-0 bg-slate-900 z-40 flex flex-col md:flex-row justify-between items-center pt-8 pb-6 mb-8 border-b border-slate-800 gap-6 shadow-md shadow-slate-900/50">
            <div>
                <div class="flex gap-2 mb-2 justify-center md:justify-start text-xs">
                    <button id="langRu" class="cursor-pointer transition font-bold text-emerald-400">RU</button>
                    <span class="text-slate-600">|</span>
                    <button id="langEn" class="cursor-pointer transition font-bold text-slate-500 hover:text-slate-300">EN</button>
                </div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-2 whitespace-nowrap">
                    <i data-lucide="trending-up" class="text-emerald-400"></i>
                    <span data-i18n="title">Валютный Дашборд</span>
                </h1>
                <p data-i18n="subtitle" class="text-slate-400 text-sm mt-1">Курсы валют и конвертер в реальном времени</p>
            </div>
            
            <div class="flex flex-col gap-3 w-full md:w-auto items-center md:items-end">
                
                <div class="flex gap-2 justify-center md:justify-end w-full sm:w-auto">
                    <button id="resetBtn" class="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded font-medium transition cursor-pointer text-sm">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                        <span data-i18n="btnReset">Сброс</span>
                    </button>
                    <button id="refreshBtn" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-1.5 rounded font-medium transition cursor-pointer">
                        <i data-lucide="refresh-cw" class="w-4 h-4" id="refreshIcon"></i>
                        <span data-i18n="btnRefresh">Обновить</span>
                    </button>
                </div>

                <div class="flex flex-row items-center justify-center gap-4 w-full md:w-full">
                    <div class="flex items-center gap-2">
                        <label for="amountInput" class="text-sm text-slate-400 whitespace-nowrap" data-i18n="labelAmount">Сумма:</label>
                        <input type="number" id="amountInput" value="1" min="0" step="any" 
                            class="w-28 bg-slate-800 border border-slate-700 rounded px-3 py-1.5 text-white font-mono focus:outline-none focus:border-emerald-500 transition text-right"
                            placeholder="1">
                    </div>

                    <div class="flex items-center gap-2">
                        <label for="baseCurrency" class="text-sm text-slate-400 whitespace-nowrap" data-i18n="labelBase">База:</label>
                        <select id="baseCurrency" class="bg-slate-800 border border-slate-700 rounded px-3 py-1.5 text-white focus:outline-none focus:border-emerald-500 transition cursor-pointer">
                        </select>
                    </div>
                </div>
                
            </div>
        </header>
        
        <div id="loading" class="text-center py-12">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full mb-4"></div>
            <p id="loadingText" class="text-slate-400">Получение свежих данных от API...</p>
        </div>

        <div id="error" class="hidden bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-lg mb-6 flex items-center gap-3">
            <i data-lucide="alert-circle" class="text-red-400"></i>
            <span id="errorText">Не удалось загрузить данные. Попробуйте позже.</span>
        </div>

        <main id="dashboard" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
        </main>
        
        <footer class="mt-8 text-center text-xs text-slate-500 space-y-1">
            <p id="currentTime">Текущие дата и время: --.--.----, --:--:-- UTC</p>
            <p id="lastUpdated" class="text-slate-400">Данные обновлены: --:--:-- UTC</p>
            <p id="footerApi" class="pt-2 text-slate-600">Данные предоставлены ExchangeRate-API</p>
        </footer>
    </div>
	
	<script src="app.js"></script>

</body>
</html>
